{% load static %}
{% load django_htmx %}
<!doctype html>
<html lang="en">
<head>
    {% htmx_script %}
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
<nav class="navbar navbar-expand-lg border-bottom app-nav">
    <div class="container-fluid">
        <span class="navbar-brand">Task Flow</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
            <span class="text-muted small">{{ user.username }}</span>
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <button class="btn btn-outline-dark btn-sm" type="submit">Logout</button>
            </form>
            {% else %}
            <a class="btn btn-outline-dark btn-sm" href="{% url 'account_login' %}">Login</a>
            <a class="btn btn-dark btn-sm" href="{% url 'account_signup' %}">Sign up</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container-fluid mt-4">
    {% block content %}

    {% endblock content %}
</div>
<div id="modal-container"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
{% block js %}

{% endblock js %}
</html>
