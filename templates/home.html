{% extends 'base.html' %}

{% block content %}
<div class="task-column mx-auto">
    <div class="panel mb-4">
        <div class="panel-header">Tasks</div>
        <div
            class="panel-body"
            id="task-form-container"
            hx-get="{% url 'task-create' %}"
            hx-trigger="load, project-list-changed from:body"
        ></div>
        <div id="task-list">
            {% for task in tasks %}
            {% include "partials/task_item.html" with task=task %}
            {% endfor %}
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Projects</div>
        <div
            class="panel-body"
            id="project-form-container"
            hx-get="{% url 'project-create' %}"
            hx-trigger="load"
        ></div>
        <div id="project-list">
            {% for project in projects %}
            {% include "partials/project_item.html" with project=project %}
            {% endfor %}
        </div>
    </div>
</div>
{% endblock content %}
