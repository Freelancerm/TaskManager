<div class="task-row" id="project-{{ project.id }}">
    <div class="flex-grow-1 fw-semibold">{{ project.name }}</div>
    <div class="d-flex gap-1">
        <button
            class="btn btn-outline-primary btn-sm"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#project-{{ project.id }}-collapse"
            aria-expanded="false"
            aria-controls="project-{{ project.id }}-collapse"
        >
            Tasks
        </button>
        <button
            class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'project-update' project.id %}"
            hx-target="#project-form-container"
            hx-swap="innerHTML"
        >
            Edit
        </button>
        <button
            class="btn btn-outline-danger btn-sm"
            hx-delete="{% url 'project-delete' project.id %}"
            hx-target="#project-{{ project.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this project?"
        >
            Delete
        </button>
    </div>
</div>
<div
    class="collapse ms-4 mb-2"
    id="project-{{ project.id }}-collapse"
    hx-get="{% url 'project-tasks' project.id %}"
    hx-target="#project-{{ project.id }}-tasks"
    hx-trigger="shown.bs.collapse, project-tasks-{{ project.id }} from:body"
    hx-swap="innerHTML"
>
    <div id="project-{{ project.id }}-tasks"></div>
</div>
