<div class="card mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{ form_title }}</h6>
        <form
            method="post"
            hx-post="{{ form_action }}"
            {% if object %}
            hx-target="#project-{{ object.id }}"
            hx-swap="outerHTML"
            {% else %}
            hx-target="#project-list"
            hx-swap="afterbegin"
            {% endif %}
        >
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-2">
                <label class="form-label" for="{{ form.name.id_for_label }}">Name</label>
                {{ form.name }}
                {% for error in form.name.errors %}
                <div class="text-danger small">{{ error }}</div>
                {% endfor %}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">{{ submit_label }}</button>
                {% if object %}
                <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm"
                    hx-get="{% url 'project-create' %}"
                    hx-target="#project-form-container"
                    hx-swap="innerHTML"
                >
                    Cancel
                </button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
