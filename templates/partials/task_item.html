<div class="task-row" id="task-{{ task.id }}" _="on mouseenter add .bg-light to me then on mouseleave remove .bg-light from me">
    <input
        class="form-check-input"
        type="checkbox"
        {% if task.is_done %}checked{% endif %}
        hx-post="{% url 'task-toggle' task.id %}"
        hx-target="#task-{{ task.id }}"
        hx-swap="outerHTML"
        hx-trigger="change"
    >
    <div class="flex-grow-1">
        <div class="task-title {% if task.is_done %}text-decoration-line-through text-muted{% endif %}">
            {{ task.title }}
        </div>
        {% if task.description %}
        <div class="task-meta">{{ task.description }}</div>
        {% endif %}
        <div class="task-meta">Priority: {{ task.get_priority_display }}</div>
        {% if task.due_date %}
        <div class="task-meta">Due Date: {{ task.due_date }}</div>
        {% endif %}
    </div>
    <div class="task-actions d-flex gap-1">
        <button
            class="btn btn-outline-secondary btn-sm"
            hx-get="{% url 'task-update' task.id %}"
            hx-target="#task-form-container"
            hx-swap="innerHTML"
        >
            Edit
        </button>
        <button
            class="btn btn-outline-danger btn-sm"
            hx-delete="{% url 'task-delete' task.id %}"
            hx-target="#task-{{ task.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this task?"
        >
            Delete
        </button>
    </div>
</div>
