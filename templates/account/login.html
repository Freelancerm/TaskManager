{% extends "base.html" %}

{% block content %}
<div class="task-column mx-auto">
    <div class="panel">
        <div class="panel-header">Login</div>
        <div class="panel-body">
            <form method="post" action="{% url 'account_login' %}">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-2">
                    <label class="form-label" for="{{ form.login.id_for_label }}">Email or Username</label>
                    <input
                        type="text"
                        name="{{ form.login.name }}"
                        id="{{ form.login.id_for_label }}"
                        class="form-control"
                        value="{{ form.login.value|default_if_none:'' }}"
                        required
                    >
                    {% for error in form.login.errors %}
                    <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
                <div class="mb-2">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                    <input
                        type="password"
                        name="{{ form.password.name }}"
                        id="{{ form.password.id_for_label }}"
                        class="form-control"
                        required
                    >
                    {% for error in form.password.errors %}
                    <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
                <div class="form-check mb-3">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="{{ form.remember.name }}"
                        id="{{ form.remember.id_for_label }}"
                        {% if form.remember.value %}checked{% endif %}
                    >
                    <label class="form-check-label" for="{{ form.remember.id_for_label }}">Remember me</label>
                </div>
                <button class="btn btn-success w-100" type="submit">Login</button>
            </form>
            <div class="text-center mt-3">
                <a class="text-decoration-none" href="{% url 'account_signup' %}">Need an account? Sign up</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
